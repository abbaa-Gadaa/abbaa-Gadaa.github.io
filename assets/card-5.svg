<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9F4"/>
      <stop offset="100%" stop-color="#FFE4D0"/>
    </linearGradient>
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4624A"/>
      <stop offset="100%" stop-color="#8B3324"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEDD5"/>
      <stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#8B3324" flood-opacity="0.18"/>
    </filter>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#C2410C" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- decorative soft circles -->
  <circle cx="280" cy="28" r="36" fill="#F97316" opacity="0.08"/>
  <circle cx="40" cy="155" r="42" fill="#9A3412" opacity="0.06"/>

  <!-- edges -->
  <path d="M160 46 L88 82" stroke="#C2410C" stroke-width="2.25" stroke-linecap="round" opacity="0.85"/>
  <path d="M160 46 L232 82" stroke="#EA580C" stroke-width="2.25" stroke-linecap="round" opacity="0.85"/>
  <path d="M88 114 L52 146 M88 114 L124 146" stroke="#B45309" stroke-width="1.75" stroke-linecap="round" opacity="0.75"/>
  <path d="M232 114 L196 146 M232 114 L268 146" stroke="#C2410C" stroke-width="1.75" stroke-linecap="round" opacity="0.75"/>

  <!-- root -->
  <rect x="118" y="10" width="84" height="38" rx="10" fill="url(#rootGrad)" filter="url(#sh)"/>
  <text x="160" y="34" text-anchor="middle" fill="#FFF7ED" font-family="system-ui,Segoe UI,sans-serif" font-size="12" font-weight="700" letter-spacing="0.02em">Root</text>

  <!-- internal nodes -->
  <rect x="48" y="78" width="80" height="36" rx="9" fill="url(#nodeGrad)" stroke="#C2410C" stroke-width="1.75" filter="url(#sh2)"/>
  <rect x="192" y="78" width="80" height="36" rx="9" fill="url(#nodeGrad)" stroke="#EA580C" stroke-width="1.75" filter="url(#sh2)"/>
  <circle cx="88" cy="96" r="3" fill="#9A3412" opacity="0.5"/>
  <circle cx="232" cy="96" r="3" fill="#C2410C" opacity="0.5"/>

  <!-- leaves: alternating brick / orange -->
  <rect x="22" y="138" width="58" height="32" rx="8" fill="#FEC89A" stroke="#EA580C" stroke-width="1.5" opacity="0.95"/>
  <rect x="92" y="138" width="58" height="32" rx="8" fill="#FDBA88" stroke="#C2410C" stroke-width="1.5" opacity="0.95"/>
  <rect x="162" y="138" width="58" height="32" rx="8" fill="#FFD6BF" stroke="#B91C1C" stroke-width="1.5" opacity="0.95"/>
  <rect x="232" y="138" width="58" height="32" rx="8" fill="#FCA5A5" stroke="#9A3412" stroke-width="1.5" opacity="0.95"/>

  <text x="51" y="159" text-anchor="middle" fill="#9A3412" font-family="system-ui,sans-serif" font-size="10" font-weight="700" opacity="0.9">A</text>
  <text x="121" y="159" text-anchor="middle" fill="#9A3412" font-family="system-ui,sans-serif" font-size="10" font-weight="700" opacity="0.9">B</text>
  <text x="191" y="159" text-anchor="middle" fill="#7F1D1D" font-family="system-ui,sans-serif" font-size="10" font-weight="700" opacity="0.9">C</text>
  <text x="261" y="159" text-anchor="middle" fill="#7F1D1D" font-family="system-ui,sans-serif" font-size="10" font-weight="700" opacity="0.9">D</text>
</svg>
